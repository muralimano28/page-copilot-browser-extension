<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Copilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="../assets/popup.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/theme.js">
  <link rel="stylesheet" crossorigin href="../assets/popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <svg class="header-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1>Page Copilot</h1>
      </div>
      <button id="btn-options" class="icon-btn" title="Open Options">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main class="app-body">
      <!-- Grouped Status Row -->
      <section class="inset-group">
        <div class="inset-row status-row">
          <div class="status-info">
            <span class="status-label">Copilot Status</span>
            <span id="status-text" class="status-value active">Active</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-enabled" checked>
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <!-- AI Summary Card -->
      <section class="card summary-card">
        <div class="card-header">
          <h2>Page Analysis</h2>
          <button id="btn-summarize" class="btn primary-btn">Analyze Page</button>
        </div>
        <div id="summary-container" class="summary-box empty">
          <p id="summary-placeholder">Analyze this tab's content with AI page comprehension.</p>
          <div id="summary-loading" class="spinner hidden">
            <svg class="spinner-svg" viewBox="0 0 50 50">
              <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
            </svg>
          </div>
          <p id="summary-text" class="hidden"></p>
        </div>
      </section>

      <!-- Selection & Notes Card -->
      <section class="card notes-card">
        <h2>Highlights & Notes</h2>
        <div class="note-input-container">
          <textarea id="note-input" rows="2" placeholder="Type a note or select text on the webpage..."></textarea>
          <div class="note-actions">
            <button id="btn-highlight" class="btn secondary-btn" title="Highlight selected text on page">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
              Highlight
            </button>
            <button id="btn-add-note" class="btn action-btn">Save Note</button>
          </div>
        </div>

        <div class="notes-list-header">
          <h3>Saved Highlights</h3>
          <button id="btn-clear-notes" class="text-link-btn hidden">Clear All</button>
        </div>
        <ul id="notes-list" class="notes-list">
          <li class="empty-list-msg">No saved notes yet.</li>
        </ul>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <span>v1.0.0 &bull; Ready for Chrome & Firefox</span>
    </footer>
  </div>
</body>
</html>
